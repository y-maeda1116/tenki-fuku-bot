# .github/workflows/build-desktop.yml
name: Build Desktop

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-22.04, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: 'go.mod'

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'

    - name: Cache Node modules
      uses: actions/cache@v5
      with:
        path: cmd/desktop/frontend/node_modules
        key: ${{ runner.os }}-node-${{ hashFiles('**/cmd/desktop/frontend/package-lock.json') }}

    - name: Install Wails CLI
      run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

    - name: Install system dependencies
      run: |
        if [ "$RUNNER_OS" = "Linux" ]; then
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libgtk-3-dev pkg-config
        elif [ "$RUNNER_OS" = "Darwin" ]; then
          echo "No additional dependencies needed for macOS"
        elif [ "$RUNNER_OS" = "Windows" ]; then
          echo "No additional dependencies needed for Windows"
        fi
      shell: bash

    - name: Install dependencies
      run: |
        go mod download
        cd cmd/desktop/frontend && npm install
      shell: bash

    - name: Build Desktop
      run: |
        cd cmd/desktop && wails build -clean -tags webview2
      shell: bash

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: MyApp-${{ matrix.os }}
        path: cmd/desktop/build/bin/
