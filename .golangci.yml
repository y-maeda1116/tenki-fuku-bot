version: "2"

run:
  timeout: 5m

linters:
  enable:
    - gosec
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
  settings:
    gosec:
      severity: medium
      confidence: medium
      excludes:
        - G104
    errcheck:
      check-type-assertions: true
      check-blank: true

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
